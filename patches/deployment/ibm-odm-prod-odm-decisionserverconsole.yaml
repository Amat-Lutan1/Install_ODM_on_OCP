spec:
  template:
    spec:
      initContainers:
        - name: init-folder-readonlyfs
          command:
            - /bin/sh
            - '-ecx'
            - |
              $(rm -rf /config-folder/* 2>/dev/null;true) && cp -rp /opt/ibm/wlp/usr/servers/defaultServer/* /config-folder && if [ -d /etc/pki/nssdb ]; then cp -rp /etc/pki/nssdb/* /nssdb-folder; fi && $(if [ -d /support ]; then cp -R /support/* /support-folder 2>/dev/null; fi;true) && cp /config-folder/application.xml /custom_config/application_dsc_original.xml && cp /config-folder/apps/DecisionService.war/WEB-INF/web.xml /custom_config/web_dsc_original.xml && cp /custom_config/application_dsc_custom.xml /config-folder/application.xml && cp /custom_config/web_dsc_custom.xml /config-folder/apps/DecisionService.war/WEB-INF/web.xml             
          volumeMounts:
            - name: custom-volume
              mountPath: /custom_config
      containers:
        - name: odm-decisionserverconsole  
          volumeMounts:
            - name: custom-volume
              mountPath: /custom_config
      volumes:
        - name: custom-volume
          persistentVolumeClaim:
            claimName: custom-pvc
